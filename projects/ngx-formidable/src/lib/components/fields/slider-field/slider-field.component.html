<div
  #sliderRef
  class="field"
  [class.is-readonly]="readonly"
  [class.is-disabled]="disabled"
  [class.focused]="isFieldFocused">
  <div class="slider-track-wrapper">
    <div class="slider-track">
      <div
        class="slider-track-fill"
        [style.width.%]="valuePercent"></div>
    </div>
    @if (showTickMarks && tickMarks.length > 0) {
      <div class="slider-tick-marks">
        @for (tick of tickMarks; track tick) {
          <div class="slider-tick-mark"></div>
        }
      </div>
    }
    @if (showThumbLabel) {
      <div
        class="slider-thumb-label"
        [style.left.%]="valuePercent"
        [attr.data-align]="thumbLabelAlign">
        <div class="slider-thumb-label-inner">
          {{ thumbLabel }}
        </div>
      </div>
    }

    <input
      #rangeRef
      type="range"
      class="slider-input"
      [id]="fieldId"
      [min]="min"
      [max]="max"
      [step]="step"
      [attr.name]="name"
      [attr.readonly]="readonly ? '' : null"
      [attr.disabled]="disabled ? '' : null"
      [attr.tabindex]="readonly || disabled ? -1 : 0"
      [value]="value ?? min"
      (focus)="onFocusChange(true)"
      (blur)="onFocusChange(false)"
      (input)="onRangeInput($event)" />
  </div>

  @if (showLabelRow) {
    <div class="slider-label-row">
      @for (item of labelItems; track item.leftPercent + '-' + item.text) {
        <div
          class="slider-label-item"
          [style.left.%]="item.leftPercent"
          [attr.data-align]="item.align">
          {{ item.text }}
        </div>
      }
    </div>
  }
</div>
